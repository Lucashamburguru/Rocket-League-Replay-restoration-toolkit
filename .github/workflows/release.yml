name: Package and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare Distribution Folder
        run: |
          mkdir -p dist/input_replays
          mkdir -p dist/restored_replays
          touch dist/input_replays/.gitkeep
          touch dist/restored_replays/.gitkeep
          cp universal_batch_converter.py dist/
          cp restore_replays.sh dist/
          cp restore_replays.bat dist/
          cp README.md dist/
          cp LICENSE dist/
          cp analyze_headers.py dist/
          chmod +x dist/restore_replays.sh

      - name: Create Zip Archive
        run: |
          cd dist && zip -r ../Rocket-League-Replay-Restoration-Toolkit-${{ github.ref_name }}.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: toolkit-archive
          path: Rocket-League-Replay-Restoration-Toolkit-*.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Rocket-League-Replay-Restoration-Toolkit-*.zip
          body_path: README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
